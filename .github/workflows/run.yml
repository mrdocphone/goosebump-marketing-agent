name: Execute Goosebump Marketing Agent

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

# CRITICAL NEW PERMISSIONS: This grants the agent direct server access
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Declares the target live environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: pip install requests google-genai

    - name: Run Marketing Brain
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python agent.py

    - name: Package Website Files
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' # Packages everything the agent just built

    - name: Push to Live Internet
      id: deployment
      uses: actions/deploy-pages@v4
